<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>

    <div class="header">← My Profile</div>

    <div class="container">

        <div class="profile-header">
            <div class="profile-avatar-circle">👤</div>
            
        </div>

        <div class="info-section">
            <div class="info-row">
                <span class="label">📧 Email</span>
                
            </div>

            <div class="info-row">
                <span class="label">📱 Phone</span>
                
            </div>

            <div class="info-row">
                <span class="label">👤 Gender</span>
                
            </div>

            <div class="info-row">
                <span class="label">🆔 NID</span>
                
            </div>

            <div class="info-row">
                <span class="label">🎂 DOB</span>
            </div>
        </div>

        <div class="profile-actions">
            <button class="edit-btn">✏️ Edit Profile</button>
            
            <div class="secondary-actions">
                <button class="outline-btn">📷 Photo</button>
                <button class="outline-btn">🔐 Password</button>
            </div>
        </div>

    </div>

</body>
</html>
