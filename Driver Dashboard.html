<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Driver App</title>
</head>
<body class="bg-slate-50">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg">
        <header class="bg-blue-600 p-6 text-white rounded-b-3xl">
            <p class="opacity-80">Welcome back,</p>
            <h1 class="text-2xl font-bold">Anis Rahman</h1>
            <div class="mt-4 flex gap-4">
                <div class="bg-blue-500/50 p-3 rounded-lg flex-1">
                    <p class="text-xs">Driving Today</p>
                    <p class="text-xl font-mono">06:42h</p>
                </div>
                <div class="bg-blue-500/50 p-3 rounded-lg flex-1">
                    <p class="text-xs">Safety Score</p>
                    <p class="text-xl font-mono">98/100</p>
                </div>
            </div>
        </header>

        <main class="p-6">
            <h3 class="font-bold text-gray-800 mb-4">Your Schedule</h3>
            
            <div class="space-y-4">
                <div class="flex items-start gap-4 p-4 border rounded-xl bg-blue-50 border-blue-100">
                    <div class="mt-1 w-3 h-3 bg-blue-600 rounded-full ring-4 ring-blue-100"></div>
                    <div>
                        <p class="font-bold">Pickup: Central Logistics</p>
                        <p class="text-sm text-gray-500">Time: 09:00 AM</p>
                        <button class="mt-2 text-xs font-bold text-blue-600">START NAVIGATION</button>
                    </div>
                </div>

                <div class="flex items-start gap-4 p-4 border rounded-xl opacity-60">
                    <div class="mt-1 w-3 h-3 bg-gray-400 rounded-full"></div>
                    <div>
                        <p class="font-bold">Drop-off: Retail Hub 12</p>
                        <p class="text-sm text-gray-500">Time: 01:30 PM</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button class="p-4 border rounded-2xl flex flex-col items-center gap-2 hover:bg-gray-50">
                    <span class="text-2xl">🚨</span>
                    <span class="text-sm font-medium">SOS Help</span>
                </button>
                <button class="p-4 border rounded-2xl flex flex-col items-center gap-2 hover:bg-gray-50">
                    <span class="text-2xl">📸</span>
                    <span class="text-sm font-medium">Log Proof</span>
                </button>
            </div>
        </main>
    </div>
</body>
</html>
