<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bus Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .map {
            margin-top: 20px;
            height: 200px;
            background: #e0e0e0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            background: #e9f7ef;
            border-radius: 5px;
            color: #2e7d32;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Track Your Bus</h2>

    <input type="text" placeholder="Enter Bus Number">
    <button>Track Bus</button>

    <div class="map">
        Map Area (Bus Location)
    </div>

    <div class="status">
        Bus is 2 km away • ETA: 5 mins
    </div>
</div>

</body>
</html>
