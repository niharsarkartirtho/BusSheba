<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency SOS</title>
</head>
<body>

    <div class="header">← Emergency Alert</div>

    <div class="container">

        <div class="main-trigger-section">
            <button class="sos-circle-btn">
                <span>SOS</span>
            </button>
            <div class="alert-title">Tap to Alert</div>
            <div class="alert-subtitle">Your location will be shared with admin</div>
        </div>

        <div class="section-title">SELECT EMERGENCY TYPE</div>

        <div class="option-grid">
            <div class="option">
                <span>⚠️</span> Harassment
            </div>
            <div class="option">
                <span>🚑</span> Medical
            </div>
            <div class="option">
                <span>💥</span> Accident
            </div>
            <div class="option">
                <span>❓</span> Other
            </div>
        </div>

        <div class="action-footer">
            <button class="cancel-btn">Cancel (30s)</button>
        </div>

    </div>

</body>
</html>
