<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Seats</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #f2f5f9;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 360px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

/* Header */
.header {
  background: #2566b3;
  color: #fff;
  padding: 18px;
}

.header h2 {
  font-size: 18px;
}

.header p {
  font-size: 13px;
  opacity: 0.9;
}

/* Info bar */
.info-bar {
  margin: 15px;
  background: #e7eff8;
  padding: 10px 12px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #2566b3;
}

/* Section */
.section {
  padding: 0 15px;
  margin-bottom: 10px;
}

.section h4 {
  font-size: 12px;
  color: #777;
  margin-bottom: 8px;
}

/* Front label */
.front {
  background: #eee;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 12px;
}

/* Seat Grid */
.seats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 0 15px;
}

.seat {
  padding: 15px 0;
  text-align: center;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* States */
.available {
  border: 2px solid #4caf50;
  color: #4caf50;
  background: #eaf7ec;
}

.selected {
  background: #2566b3;
  color: #fff;
}

.taken {
  border: 2px solid #f44336;
  color: #f44336;
  background: #fdecec;
}

/* Legend */
.legend {
  display: flex;
  justify-content: space-around;
  font-size: 12px;
  margin: 15px 0;
}

.legend span {
  display: flex;
  align-items: center;
  gap: 5px;
}

.box {
  width: 12px;
  height: 12px;
  border-radius: 3px;
}

.box.available { background: #4caf50; }
.box.selected { background: #2566b3; }
.box.taken { background: #f44336; }

/* Summary */
.summary {
  margin: 15px;
  padding: 12px;
  border-radius: 10px;
  background: #f7f7f7;
  font-size: 13px;
}

.summary .row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.total {
  font-weight: bold;
  color: #2566b3;
}

/* Button */
.btn {
  margin: 0 15px 15px;
  background: #2566b3;
  color: #fff;
  text-align: center;
  padding: 14px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h2>← Select Seats</h2>
    <p>Mirpur → Motijheel</p>
  </div>

  <!-- Info -->
  <div class="info-bar">
    <span>📅 Today, 8:30 AM</span>
    <span>৳ 35 / seat</span>
  </div>

  <!-- Section -->
  <div class="section">
    <h4>CHOOSE YOUR SEAT</h4>
  </div>

  <div class="front">🚌 FRONT — DRIVER</div>

  <!-- Seats -->
  <div class="seats">
    <div class="seat taken">1A</div>
    <div class="seat taken">1B</div>
    <div></div>

    <div class="seat available">2A</div>
    <div class="seat selected">2B</div>
    <div class="seat available">2D</div>

    <div class="seat available">3A</div>
    <div class="seat available">3B</div>
    <div class="seat taken">3D</div>

    <div class="seat available">4A</div>
    <div class="seat available">4B</div>
    <div class="seat selected">4D</div>

    <div class="seat available">5A</div>
    <div class="seat taken">5B</div>
    <div class="seat available">5D</div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <span><div class="box available"></div> Available</span>
    <span><div class="box selected"></div> Selected</span>
    <span><div class="box taken"></div> Taken</span>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="row">
      <span>Seats selected</span>
      <span>2B, 4D</span>
    </div>
    <div class="row">
      <span>Price per seat</span>
      <span>৳ 35</span>
    </div>
    <div class="row total">
      <span>Total</span>
      <span>৳ 70</span>
    </div>
  </div>

  <!-- Button -->
  <div class="btn">Confirm Booking →</div>

</div>

</body>
</html>
