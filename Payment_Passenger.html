<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

.header {
    background: #1f5fa8;
    color: white;
    padding: 15px;
    font-size: 18px;
}

.container {
    max-width: 400px;
    margin: auto;
    background: #f7f7f7;
    padding: 15px;
}

.card {
    background: #dfe8f1;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.total {
    font-size: 22px;
    color: #1f5fa8;
    font-weight: bold;
}

.section-title {
    font-size: 12px;
    color: #777;
    margin: 15px 0 8px;
    font-weight: bold;
}

.option {
    background: white;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    cursor: pointer;
}

.option.active {
    border: 2px solid #1f5fa8;
}

.option input {
    margin-right: 10px;
}

.input-box {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-bottom: 10px;
}

.secure {
    background: #e6f4ea;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    color: #2e7d32;
    margin-bottom: 15px;
}

.pay-btn {
    width: 100%;
    padding: 15px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.pay-btn:hover {
    background: #256428;
}
</style>
</head>

<body>

<div class="header">← Choose Payment</div>

<div class="container">

    <div class="card">
        <div>Mirpur → Motijheel • 2 seats</div>
        <div class="total">Total: ৳70</div>
    </div>

    <div class="section-title">SELECT PAYMENT METHOD</div>

    <div class="option active">
        <input type="radio" checked>
        Card Payment (VISA / MC)
    </div>

    <div class="option">
        <input type="radio">
        bKash
    </div>

    <div class="option">
        <input type="radio">
        Rocket
    </div>

    <div class="option">
        <input type="radio">
        Nagad
    </div>

    <div class="section-title">ACCOUNT / CARD NUMBER</div>
    <input class="input-box" placeholder="Enter account or card number">

    <div class="section-title">AMOUNT (৳)</div>
    <input class="input-box" value="70" readonly>

    <div class="secure">
        🔒 Your payment is secured with 256-bit SSL encryption
    </div>

    <button class="pay-btn">Pay ৳70 Securely</button>

</div>

</body>
</html>
